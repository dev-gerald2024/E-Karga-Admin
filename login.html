<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Karga | Admin Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            /* Blue & Yellow Theme Palette */
            --bg-base: #061022; 
            --bg-surface: rgba(17, 34, 64, 0.7); 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8;
            
            --primary: #facc15; 
            --primary-hover: #eab308; 
            --primary-glow: rgba(250, 204, 21, 0.2); 
            
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(16px);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Outfit', sans-serif; 
        }
        
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: var(--bg-base); 
            background-image: 
                radial-gradient(at 20% 20%, rgba(59, 130, 246, 0.2) 0px, transparent 50%),
                radial-gradient(at 80% 80%, rgba(250, 204, 21, 0.1) 0px, transparent 50%);
            color: var(--text-main); 
            padding: 2rem;
        }

        /* Glassmorphism Login Card */
        .login-card {
            background: var(--bg-surface);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Logo & Header */
        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        .logo-container svg {
            width: 160px;
            height: auto;
            max-width: 100%;
        }

        .header-text {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header-text h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .header-text p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.4;
        }

        /* Form Elements */
        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem; /* Keeps iOS from auto-zooming */
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            -webkit-appearance: none; /* Removes default iOS styling */
        }

        input::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Submit Button */
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: #061022;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            -webkit-appearance: none;
        }

        .btn-login:hover {
            background: var(--primary-hover);
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateY(-2px);
        }

        /* Links */
        .footer-links {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 480px) {
            body {
                padding: 1rem; /* Less padding on the outside */
            }

            .login-card {
                padding: 2.5rem 1.5rem; /* Tighter padding inside the card */
                border-radius: 20px;
            }

            .logo-container {
                margin-bottom: 1.5rem;
            }

            .logo-container svg {
                width: 140px; /* Scale logo down slightly */
            }

            .header-text {
                margin-bottom: 2rem;
            }

            .header-text h2 {
                font-size: 1.35rem; /* Slightly smaller title */
            }

            .input-group {
                margin-bottom: 1.25rem;
            }

            input {
                padding: 0.85rem 1rem; /* Slightly tighter input fields */
            }

            .btn-login {
                padding: 0.85rem 1rem;
                font-size: 1.05rem;
            }

            .footer-links {
                flex-direction: column; /* Stack links vertically on tiny screens */
                align-items: center;
                gap: 0.8rem;
                margin-top: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 60" width="160" height="40">
    <!-- Classic Gas Pump Icon -->
    <g transform="translate(15, 8) scale(1.8)">
        <path d="M19.77 7.23l.01-.01-3.72-3.72L15 4.56l2.11 2.11c-.94.36-1.61 1.26-1.61 2.33 0 1.38 1.12 2.5 2.5 2.5.36 0 .69-.08 1-.21v7.21c0 .55-.45 1-1 1s-1-.45-1-1V14c0-1.1-.9-2-2-2h-1V5c0-1.1-.9-2-2-2H6c-1.1 0-2 .9-2 2v16h10v-7.5h1.5v5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V9c0-.69-.28-1.32-.73-1.77zM12 10H8V5h4v5z" fill="#facc15"/>
    </g>
    <!-- E-Karga Text -->
    <text x="70" y="40" font-family="'Outfit', sans-serif" font-size="28" font-weight="800" fill="#facc15">E-<tspan fill="#f8fafc">KARGA</tspan></text>
</svg>
        </div>

        <div class="header-text">
            <h2>Command Center Access</h2>
            <p>Enter your credentials to manage station operations.</p>
        </div>

        <form id="adminLoginForm">
            <div class="input-group">
                <label for="adminId">Admin ID / Email</label>
                <input type="text" id="adminId" placeholder="e.g., admin@ekarga.ph" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            alert('Authentication successful. Routing to Command Center...');
            window.location.href = 'admin.html'; 
        });
    </script>

</body>
</html>
