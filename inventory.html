<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Karga | Inventory Log</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-base: #061022; --bg-surface: rgba(17, 34, 64, 0.7); 
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --primary: #facc15; --primary-hover: #eab308; --primary-glow: rgba(250, 204, 21, 0.2); 
            --danger: #ef4444; --border-color: rgba(255, 255, 255, 0.1); --glass-blur: blur(12px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { display: flex; min-height: 100vh; background-color: var(--bg-base); background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(250, 204, 21, 0.1) 0px, transparent 50%); color: var(--text-main); }
        
        .sidebar { width: 280px; background: var(--bg-surface); backdrop-filter: var(--glass-blur); border-right: 1px solid var(--border-color); padding: 2.5rem 2rem; display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; }
        .logo-container { margin-bottom: 3rem; display: flex; justify-content: center; }
        .logo-container svg { max-width: 100%; height: auto; }
        .nav-links { display: flex; flex-direction: column; height: 100%; gap: 0.5rem; }
        .nav-item { padding: 0.85rem 1.2rem; color: var(--text-muted); font-size: 1rem; font-weight: 500; border-radius: 12px; cursor: pointer; text-decoration: none; display: flex; align-items: center; transition: all 0.3s; }
        .nav-item:hover { color: var(--text-main); background: rgba(255,255,255,0.05); transform: translateX(5px); }
        .nav-item.active { background: linear-gradient(135deg, rgba(250, 204, 21, 0.15) 0%, rgba(250, 204, 21, 0.02) 100%); color: var(--primary); border: 1px solid rgba(250, 204, 21, 0.3); box-shadow: 0 0 20px var(--primary-glow); }
        .logout-btn { margin-top: auto; color: var(--danger); }
        
        .main-content { flex: 1; padding: 3rem 4rem; overflow-y: auto; width: 100%; }
        .header { margin-bottom: 2.5rem; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1.5rem; }
        .header h1 { font-size: 2.2rem; font-weight: 700; background: linear-gradient(to right, #f8fafc, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text-muted); font-size: 1rem; margin-top: 0.4rem; }
        
        .controls { display: flex; gap: 1rem; width: 100%; max-width: 400px;}
        select { flex: 1; padding: 0.8rem 1.2rem; background: rgba(17,34,64,0.8); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 12px; outline: none; font-size: 1rem; cursor: pointer; backdrop-filter: var(--glass-blur); -webkit-appearance: none;}
        select:focus { border-color: var(--primary); }
        select option { background: var(--bg-base); color: var(--text-main); }
        
        .table-wrapper { background: var(--bg-surface); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 20px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; min-width: 700px; }
        th { background: rgba(255,255,255,0.02); padding: 1.2rem 2rem; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border-color); text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }
        td { padding: 1.2rem 2rem; border-bottom: 1px solid var(--border-color); color: var(--text-main); }
        tr:last-child td { border-bottom: none; }
        
        .type-out { color: #ef4444; font-weight: 600; } 
        .type-in { color: #10b981; font-weight: 600; }  

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 1.5rem; border-right: none; border-bottom: 1px solid var(--border-color); }
            .nav-links { flex-direction: row; overflow-x: auto; padding-bottom: 0.5rem; -webkit-overflow-scrolling: touch; }
            .nav-item { white-space: nowrap; transform: none !important; }
            .main-content { padding: 2rem; }
        }

        @media (max-width: 480px) {
            .sidebar { padding: 1rem; }
            .logo-container svg { width: 130px; }
            .main-content { padding: 1.2rem; }
            .header h1 { font-size: 1.8rem; }
            .controls { flex-direction: column; max-width: 100%; }
            .controls select { width: 100%; }
            th, td { padding: 1rem; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 60" width="160" height="40">
                <path d="M 30 5 L 44.14 20.86 A 20 20 0 1 1 15.86 20.86 Z" fill="#facc15"/>
                <path d="M 32 18 L 18 32 L 28 32 L 24 45 L 42 27 L 32 27 Z" fill="#061022"/>
                <text x="65" y="40" font-family="'Outfit', sans-serif" font-size="28" font-weight="800" fill="#facc15">E-<tspan fill="#f8fafc">KARGA</tspan></text>
            </svg>
        </div>
        <div class="nav-links">
            <a href="admin.html" class="nav-item">Overview</a>
            <a href="scanner.html" class="nav-item">QR Scanner</a>
            <a href="inventory.html" class="nav-item active">Inventory Log</a>
            <a href="alerts.html" class="nav-item">Price Alerts</a>
            <a href="login.html" class="nav-item logout-btn" onclick="return confirm('Securely log out?');">Logout Session</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <div>
                <h1>Inventory Log</h1>
                <p>Track historical resupplies and claims.</p>
            </div>
            <div class="controls">
                <select><option>All Fuel Types</option><option>Diesel</option></select>
                <select><option>Last 7 Days</option></select>
            </div>
        </header>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Type</th>
                        <th>Variant</th>
                        <th>Volume</th>
                        <th>Reference</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="color: var(--text-muted);">Oct 24 - 18:15</td>
                        <td><span class="type-out">↓ Dispense</span></td>
                        <td>Diesel</td>
                        <td style="font-weight: 600;">20 L</td>
                        <td style="font-family: monospace;">TXN-88492</td>
                    </tr>
                    <tr>
                        <td style="color: var(--text-muted);">Oct 24 - 10:00</td>
                        <td><span class="type-in">↑ Resupply</span></td>
                        <td>Diesel</td>
                        <td style="font-weight: 600;">5,000 L</td>
                        <td style="font-family: monospace;">DELIVERY-992</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
